<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login 💖</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-pink-100 to-purple-200 h-screen flex items-center justify-center">

  <div class="bg-white p-8 rounded-2xl shadow-2xl w-80 text-center">
    <h1 class="text-2xl font-bold mb-4">Секретний доступ 💌</h1>
    <input id="password" type="password" placeholder="Пароль"
      class="w-full p-2 border rounded mb-4" />
    <button onclick="login()"
      class="w-full bg-pink-500 text-white py-2 rounded hover:bg-pink-600 transition">
      Увійти
    </button>
  </div>

<script>
function login() {
  const pass = document.getElementById('password').value;

  if (pass === 'love_you') {
    localStorage.setItem('auth', 'true');
    localStorage.setItem('level', '0');
    window.location.href = 'quest.html';
  } else {
    alert('Неправильний пароль 😏');
  }
}
</script>

</body>
</html>
