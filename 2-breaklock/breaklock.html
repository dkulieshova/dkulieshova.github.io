<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Злом замка</title>
  <link rel="stylesheet" href="breaklock.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <h1>Злом замка</h1>
      <p class="intro">
        Проведи мишею по точках, щоб зламати три замка і отримати доступ до важливих підказок!</p>
    </header>

    <section class="board-wrap">
      <div class="board" id="board" aria-label="Сітка для коду" role="application">
        <svg id="pathLayer" class="path-layer" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true"></svg>
      </div>
    </section>


    <section>
      <p id="feedback" class="feedback" aria-live="polite"></p>
    </section>

    <section class="history-wrap">
      <h2>Історія спроб</h2>
      <ol id="history" class="history-list"></ol>
    </section>
  </main>

  <script type="module" src="main.js"></script>
</body>
</html>
