<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday 🎉</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="script.js"></script>
</head>
<body class="bg-gradient-to-br from-yellow-100 to-pink-200 h-screen flex items-center justify-center">

<div class="text-center">
  <h1 class="text-4xl font-bold mb-4">З Днем Народження!!! 🎂</h1>
  <p class="text-lg">Ти пройшла перше випробування 💖</p>
</div>

<script>
const duration = 5000;
const end = Date.now() + duration;

(function frame() {
  confetti({
    particleCount: 3,
    angle: 60,
    spread: 55,
    origin: { x: 0 }
  });
  confetti({
    particleCount: 3,
    angle: 120,
    spread: 55,
    origin: { x: 1 }
  });

  if (Date.now() < end) {
    requestAnimationFrame(frame);
  }
})();
</script>

</body>
</html>
