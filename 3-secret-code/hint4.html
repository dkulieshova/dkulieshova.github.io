<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Остання підказка 🔐</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="icon" href="../images/moustache.png">

  <style>
    .morse-box {
      letter-spacing: 4px;
      line-height: 1;
      word-spacing: 10px;
    }
  </style>
</head>

<body class="bg-gradient-to-br from-purple-100 to-pink-100 min-h-screen flex items-center justify-center p-6">

  <div class="bg-white shadow-2xl rounded-3xl p-8 max-w-3xl w-full text-center">

    <h1 class="text-3xl font-bold mb-4">
      Остання підказка 🕵️
    </h1>

    <p class="text-gray-500 mb-6">
      Схоже, тут зашифроване повідомлення...
    </p>

    <div class="bg-gray-100 rounded-2xl p-6 mb-8 shadow-inner">
        <div class="morse-box text-xl font-mono font-bold tracking-widest leading-loose
            h-64 overflow-auto mx-auto max-w-md">
          ●━●   ●━   ━●●● <br>
          ━━●   ●━   ━●━●   ━━━   ━●━ <br>
          ●● <br>
          ━●●   ●━━   ●━ <br>
          ━━●   ●━   ━●━●   ━━━   ━●━   ━●●━━ <br>
          ●━ <br>
          ━━   ●●●━ <br>
          ━●   ━●●● <br>
          ━●●●●━ <br>
          ●━●━   ━━●●   ●●━●   ━━━   ━●━   ●━●━●━
        </div>
    </div>

    <h2 class="text-xl font-semibold mb-4">
      Абетка Морзе 🇺🇦
    </h2>

    <img
      src="code.PNG"
      alt="Абетка Морзе"
      class="mx-auto rounded-2xl shadow-lg border w-64"
    >

    <p class="mt-6 text-sm text-gray-400 italic">
      Можливо, це допоможе тобі знайти відповідь 😏
    </p>

  </div>

</body>
</html>
