<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quest 🎬</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="quest-video-1.js"></script>
  <link rel="icon" href="../images/money.png">
</head>
<body class="bg-gradient-to-br from-purple-100 to-pink-100 min-h-screen flex items-center justify-center p-4">

  <div class="bg-white p-4 sm:p-8 rounded-3xl shadow-2xl max-w-4xl w-full text-center">

    <video id="video1" controls class="rounded-2xl mb-6 w-full shadow-lg aspect-video object-cover">
      <source src="../videos/1.mp4" type="video/mp4">
      Ваш браузер не підтримує відео.
    </video>

<div id="popup"
     class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
    
    <div class="bg-white p-8 rounded-3xl text-center w-full max-w-xs shadow-2xl transform transition-all">
      
      <div class="bg-yellow-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner">
        <img src="../images/money.png" alt="гроші" class="w-12 h-12 object-contain">
      </div>

      <h2 class="text-2xl font-bold mb-2 text-gray-800">Заробити коіни?</h2>
      <p class="text-gray-500 mb-6 text-sm">Виконайте завдання та отримайте нагороду на баланс!</p>

      <div class="space-y-3">
        <button onclick="correct()"
          class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-2xl w-full shadow-lg shadow-indigo-200 transition-all active:scale-95">
          Почнімо!!! 🚀
        </button>

        <button onclick="wrong()"
          class="bg-gray-100 hover:bg-gray-200 text-gray-600 font-semibold py-3 px-6 rounded-2xl w-full transition-all active:scale-95">
          Не зараз
        </button>
      </div>

      <p id="error" class="text-red-500 mt-4 text-sm font-medium hidden bg-red-50 py-2 rounded-lg">
        Упс, здається ця кнопка не працює 😄
      </p>
      
    </div>
</div>
</div>

</body>
</html>
